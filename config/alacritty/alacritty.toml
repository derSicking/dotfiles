[env]
TERM = "xterm-256color"

[font.normal]
family = "Meslo LGS NF"
style = "Regular"

[font.italic]
family = "Meslo LGS NF"
style = "Italic"

[font.bold]
family = "Meslo LGS NF"
style = "Bold"

# -----------------------------------------------------------------------------
# TokyoNight Alacritty Colors
# Theme: Tokyo Night Day
# Upstream: https://github.com/folke/tokyonight.nvim/raw/main/extras/alacritty/tokyonight_day.toml
# -----------------------------------------------------------------------------

# Default colors
[colors.primary]
background = '#e1e2e7'
foreground = '#3760bf'

# Normal colors
[colors.normal]
black = '#b4b5b9'
red = '#f52a65'
green = '#587539'
yellow = '#8c6c3e'
blue = '#2e7de9'
magenta = '#9854f1'
cyan = '#007197'
white = '#6172b0'

# Bright colors
[colors.bright]
black = '#a1a6c5'
red = '#ff4774'
green = '#5c8524'
yellow = '#a27629'
blue = '#358aff'
magenta = '#a463ff'
cyan = '#007ea8'
white = '#3760bf'

